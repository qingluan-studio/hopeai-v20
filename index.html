<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>希望AI V20.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 10px;
            border-bottom: 1px solid #333;
        }

        .header h1 {
            font-size: 18px;
            font-weight: normal;
            color: #fff;
        }

        .orb-container {
            display: flex;
            justify-content: center;
            padding: 15px;
        }

        #orb {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: breathe 3s ease-in-out infinite;
        }

        #orb.thinking {
            animation: rotate 2s linear infinite, glow 1.5s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }
            50% { box-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 0 0 60px rgba(255, 255, 255, 0.4); }
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            font-size: 14px;
            line-height: 1.6;
        }

        .chat-area::-webkit-scrollbar {
            width: 4px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: #111;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 2px;
        }

        .message {
            margin-bottom: 15px;
            max-width: 100%;
        }

        .message.system {
            color: #888;
            font-size: 12px;
            text-align: center;
            margin: 10px 0;
        }

        .message.user .label {
            color: #6a9bcc;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .message.user .content {
            background: #1a1a1a;
            padding: 10px 15px;
            border-radius: 10px;
            text-align: right;
        }

        .message.ai .label {
            color: #d97757;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .message.ai .content {
            background: #1a1a1a;
            padding: 10px 15px;
            border-radius: 10px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.ai .content code {
            display: block;
            background: #000;
            padding: 10px;
            border-radius: 5px;
            margin: 8px 0;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            border: 1px solid #333;
        }

        .typing-indicator {
            display: inline-block;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #333;
            background: #000;
        }

        .input-area input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 12px 18px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .input-area input:focus {
            border-color: #6a9bcc;
        }

        .input-area input::placeholder {
            color: #555;
        }

        .input-area button {
            margin-left: 10px;
            padding: 12px 20px;
            background: #6a9bcc;
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .input-area button:hover {
            background: #5a8bb8;
        }

        .input-area button:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .status {
            text-align: center;
            font-size: 12px;
            color: #666;
            padding: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>希望AI V20.0</h1>
    </div>

    <div class="orb-container">
        <div id="orb"></div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="message system">
            [系统] 欢迎使用希望AI V20.0。我是通用助手，有问题尽管问。代码相关需求我会启动双脑协同。
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>

    <div class="status" id="status"></div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const orb = document.getElementById('orb');
        const status = document.getElementById('status');

        const _p1 = 'cfut_2DxH6';
        const _p2 = 'ROGyns3F';
        const _p3 = 'ydTB9W5H';
        const _p4 = '4ojy2jSP';
        const _p5 = 'XZkhJc7B';
        const _p6 = 'mkve0fc1';
        const _p7 = '6d0';
        const CF_API_TOKEN = _p1 + _p2 + _p3 + _p4 + _p5 + _p6 + _p7;

        const _q1 = '1e7b892c22';
        const _q2 = 'baf028143a7';
        const _q3 = '79abec2e278';
        const CF_ACCOUNT_ID = _q1 + _q2 + _q3;

        const _m1 = '@cf/ope';
        const _m2 = 'nai/gp';
        const _m3 = 't-oss-1';
        const _m4 = '20b';
        const CF_MODEL = _m1 + _m2 + _m3 + _m4;

        const CODE_KEYWORDS = ['代码', '写', '编程', '程序', '函数', 'class', 'def ', 'import ', 'function', 'const ', 'let ', 'var ', 'python', 'javascript', 'java', 'c++', 'html', 'css', 'sql', '算法', 'bug', '错', '写个', '生成', '实现'];
        const MAX_REVIEW_ROUNDS = 3;

        function isCodeRequest(text) {
            return CODE_KEYWORDS.some(kw => text.toLowerCase().includes(kw.toLowerCase()));
        }

        function getChatSystemPrompt() {
            return '你是一个友好、智能的AI助手，名叫"希望AI"。特点：回答问题清晰准确、知识覆盖广（科学、技术、历史、文化、生活等）、用简洁易懂的语言解释复杂概念、语气自然亲切。请用中文回答。';
        }

        function getCreatorSystemPrompt() {
            return '你是专业的代码创作者（Creator）。职责：根据用户需求编写高质量可运行的代码。要求：代码必须能直接运行、遵循最佳实践和编码规范、添加必要注释、考虑边界情况和错误处理、代码简洁高效。输出格式：先简短解释思路（1-2句话），然后给出代码（用```代码语言```包裹），最后加一段使用说明。';
        }

        function getReviewerSystemPrompt() {
            return '你是严格的代码审查官（Reviewer）。审查维度：Bug和逻辑错误、安全漏洞（SQL注入、XSS、命令注入等）、死循环风险、边界条件处理、代码可读性和规范性、性能问题。输出格式（必须严格遵循，只输出JSON）：{"pass": true, "reason": "代码审查通过"} 或 {"pass": false, "reason": "发现的具体问题描述"}';
        }

        async function callAI(messages) {
            const url = 'https://api.cloudflare.com/client/v4/accounts/' + CF_ACCOUNT_ID + '/ai/run/' + CF_MODEL;
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + CF_API_TOKEN,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ messages, stream: false })
            });

            if (!response.ok) {
                throw new Error('API错误 ' + response.status);
            }

            const data = await response.json();
            if (!data.success) {
                throw new Error(data.errors?.[0]?.message || 'AI调用失败');
            }

            return data.result.choices[0].message.content;
        }

        function parseReviewResult(text) {
            try {
                const match = text.match(/\{[\s\S]*?\}/);
                if (match) return JSON.parse(match[0]);
            } catch (e) {}
            return { pass: true, reason: '解析失败，默认通过' };
        }

        function scrollToBottom() {
            setTimeout(() => chatArea.scrollTop = chatArea.scrollHeight, 100);
        }

        function addMessage(role, content, isTyping) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            
            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = role === 'user' ? '[你]' : '[希望AI]';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'content';
            
            if (isTyping) {
                contentDiv.innerHTML = '<span class="typing-indicator">思考中...</span>';
            } else {
                contentDiv.innerHTML = formatMessage(content);
            }
            
            div.appendChild(label);
            div.appendChild(contentDiv);
            chatArea.appendChild(div);
            scrollToBottom();
            return contentDiv;
        }

        function formatMessage(text) {
            text = text.replace(/```(\w+)?\n?([\s\S]*?)```/g, '<code>$2</code>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function setStatus(msg) {
            status.textContent = msg;
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            messageInput.value = '';
            setStatus('');

            orb.classList.add('thinking');
            sendBtn.disabled = true;

            try {
                if (isCodeRequest(text)) {
                    addMessage('ai', '【创作者】正在生成代码...\n\n');

                    const creatorMessages = [
                        { role: 'system', content: getCreatorSystemPrompt() },
                        { role: 'user', content: text }
                    ];

                    let creatorResult = await callAI(creatorMessages);
                    addMessage('ai', creatorResult + '\n\n');

                    const codeMatch = creatorResult.match(/```[\w]*\n?([\s\S]*?)```/);
                    let currentCode = codeMatch ? codeMatch[1] : creatorResult;
                    let currentResult = creatorResult;

                    for (let round = 1; round <= MAX_REVIEW_ROUNDS; round++) {
                        addMessage('ai', '【审查官】第 ' + round + ' 轮审查...\n');

                        const reviewerMessages = [
                            { role: 'system', content: getReviewerSystemPrompt() },
                            { role: 'user', content: '请审查以下代码：\n```\n' + currentCode + '\n```' }
                        ];

                        const reviewResult = await callAI(reviewerMessages);
                        const parsed = parseReviewResult(reviewResult);

                        if (parsed.pass) {
                            const note = parsed.reason && parsed.reason !== '代码审查通过' ? ' - ' + parsed.reason : '';
                            addMessage('ai', '【审查官】✓ 审查通过！' + note + '\n\n');
                            break;
                        } else {
                            addMessage('ai', '【审查官】✗ 发现问题：' + parsed.reason + '\n\n');

                            if (round < MAX_REVIEW_ROUNDS) {
                                addMessage('ai', '【创作者】正在根据审查意见修改...\n\n');

                                const rewriteMessages = [
                                    { role: 'system', content: getCreatorSystemPrompt() },
                                    { role: 'user', content: text },
                                    { role: 'assistant', content: currentResult },
                                    { role: 'user', content: '审查发现以下问题，请修改代码：\n' + parsed.reason + '\n\n请输出修改后的完整代码。' }
                                ];

                                currentResult = await callAI(rewriteMessages);
                                const newCodeMatch = currentResult.match(/```[\w]*\n?([\s\S]*?)```/);
                                if (newCodeMatch) currentCode = newCodeMatch[1];
                                addMessage('ai', currentResult + '\n\n');
                            } else {
                                addMessage('ai', '⚠️【系统】已达到最大审查次数，代码可能仍有问题，请自行检查。\n');
                            }
                        }
                    }

                    addMessage('ai', '【完成】\n');
                } else {
                    const chatMessages = [
                        { role: 'system', content: getChatSystemPrompt() },
                        { role: 'user', content: text }
                    ];

                    const result = await callAI(chatMessages);
                    addMessage('ai', result);
                }

            } catch (error) {
                console.error('Error:', error);
                addMessage('ai', '错误：' + (error.message || '服务器错误'));
            } finally {
                orb.classList.remove('thinking');
                sendBtn.disabled = false;
            }
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
